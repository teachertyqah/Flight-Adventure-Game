<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Adventure v3 (Stable)</title>
    <style>
        body { margin: 0; text-align: center; font-family: sans-serif; background: #87CEEB; }
        #game-area { position: relative; width: 100%; height: 50vh; background: #1e90ff; overflow: hidden; border-bottom: 10px solid #2ecc71; }
        #plane { position: absolute; left: 10%; top: 40%; font-size: 50px; transition: all 0.8s; }
        .crash { transform: rotate(120deg) translateY(500px) !important; }
        #panel { padding: 20px; background: white; margin: 10px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; background: #f39c12; color: white; font-weight: bold; }
        .btn:disabled { background: #bdc3c7; }
        .listening { background: #e74c3c !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #score { font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

<div id="game-area">
    <div id="plane">✈️</div>
</div>

<div id="panel">
    <div id="score">POINTS: 0</div>
    <p id="sentence">Click START MISSION to begin</p>
    <p id="status" style="color: #7f8c8d;">Microphone is off</p>
    
    <button id="main-btn" class="btn" onclick="handleBtn()">START MISSION</button>
</div>

<script>
    const tasks = [
        { s: "I travel by aeroplane during my holiday.", k: "aeroplane" },
        { s: "My journey to school takes twenty minutes.", k: "minutes" },
        { s: "We arrived at the airport early in the morning.", k: "airport" },
        { s: "The passenger is waiting for the bus.", k: "passenger" },
        { s: "I bought a ticket for the train.", k: "ticket" },
        { s: "The train station is very crowded today.", k: "station" },
        { s: "He rides his bicycle to the park.", k: "bicycle" },
        { s: "My brother has a new motorcycle.", k: "motorcycle" },
        { s: "We are going on a long journey tomorrow.", k: "journey" },
        { s: "The aeroplane is taking off now.", k: "taking off" }
    ];

    let current = 0;
    let score = 0;
    let isListening = false;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;

    if (recognition) {
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => {
            isListening = true;
            document.getElementById('main-btn').innerText = "STOP & CHECK";
            document.getElementById('main-btn').classList.add('listening');
            document.getElementById('status').innerText = "🔴 Listening... Speak now!";
        };

        recognition.onresult = (event) => {
            const said = event.results[0][0].transcript.toLowerCase();
            document.getElementById('status').innerText = "I heard: " + said;
            check(said);
        };

        recognition.onerror = (e) => {
            stop();
            document.getElementById('status').innerText = "Error: Mic not found or blocked.";
        };

        recognition.onend = () => { stop(); };
    }

    function handleBtn() {
        if (!recognition) return alert("Browser not supported!");
        
        const btn = document.getElementById('main-btn');
        if (btn.innerText === "START MISSION" || btn.innerText === "RETRY" || btn.innerText === "PLAY AGAIN") {
            reset();
        } else if (!isListening) {
            recognition.start();
        } else {
            recognition.stop();
        }
    }

    function stop() {
        isListening = false;
        document.getElementById('main-btn').innerText = "🎤 CLICK TO SPEAK";
        document.getElementById('main-btn').classList.remove('listening');
    }

    function reset() {
        current = 0; score = 0;
        document.getElementById('score').innerText = "POINTS: 0";
        document.getElementById('plane').className = "";
        document.getElementById('plane').style.left = "10%";
        document.getElementById('plane').style.top = "40%";
        document.getElementById('main-btn').innerText = "🎤 CLICK TO SPEAK";
        document.getElementById('sentence').innerText = tasks[0].s;
    }

    function check(said) {
        if (said.includes(tasks[current].k)) {
            score += 10;
            document.getElementById('score').innerText = "POINTS: " + score;
            document.getElementById('plane').style.left = (parseInt(document.getElementById('plane').style.left) + 8) + "%";
            current++;
            if (current >= tasks.length) {
                document.getElementById('sentence').innerText = "🏆 MISSION COMPLETE!";
                document.getElementById('main-btn').innerText = "PLAY AGAIN";
            } else {
                document.getElementById('sentence').innerText = tasks[current].s;
            }
        } else {
            document.getElementById('plane').classList.add('crash');
            document.getElementById('sentence').innerText = "💥 CRASHED! Final Score: " + score;
            document.getElementById('main-btn').innerText = "RETRY";
        }
    }
</script>

</body>
</html>
